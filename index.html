        <!-- SW Unregister: مسح الـ service worker القديم لمنع الصفحة البيضاء -->
    <script>
      (function () {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            var hadSW = registrations.length > 0;
            var unregisterPromises = registrations.map(function (r) { return r.unregister(); });
            Promise.all(unregisterPromises).then(function () {
              if (hadSW && 'caches' in window) {
                caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                }).then(function () {
                  var key = 'sw_unregister_reload';
                  if (!sessionStorage.getItem(key)) {
                    sessionStorage.setItem(key, '1');
                    window.location.reload();
                  }
                });
              }
            });
          });
        }
      })();
    </script>

    <!-- يقرأ React باللغة المحفوظة قبل ما ينبث – يمنع FOUC -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('language-storage');
          var lang = 'ar';
          if (stored) {
            var parsed = JSON.parse(stored);
            lang = parsed.state.language || 'en';
          }
          var dir = lang === 'ar' ? 'rtl' : 'ltr';
          document.documentElement.setAttribute('lang', lang);
          document.documentElement.setAttribute('dir', dir);
        } catch (e) {}
      })();

      // تفادي ظهور صفحة بيضاء عند تحديث الموقع (Chunks) معالجة أخطاء تحميل الملفات البرمجية المجزأة //
      (function () {
        var RELOAD_KEY = 'chunk_reload_attempted';
        var MAX_RELOADS = 1;

        function safeReload() {
          try {
            var count = parseInt(sessionStorage.getItem(RELOAD_KEY) || '0', 10);
            if (count < MAX_RELOADS) {
              sessionStorage.setItem(RELOAD_KEY, String(count + 1));
              window.location.reload();
            } else {
              sessionStorage.removeItem(RELOAD_KEY);
              console.error('Chunk load error persists after reload. Please check the deployment.');
            }
          } catch (err) {
            // sessionStorage not available
          }
        }

        window.addEventListener('vite:preloadError', function (event) {
          console.warn('Preload chunk error detected, reloading page...', event);
          safeReload();
        });

        window.addEventListener('error', function (e) {
          if (e && e.message && (e.message.indexOf('dynamically imported module') !== -1 || e.message.indexOf('Failed to fetch dynamically imported module') !== -1)) {
            console.warn('Dynamic import chunk error detected, reloading page...', e);
            safeReload();
          }
        }, true);
      })();
    </script>
