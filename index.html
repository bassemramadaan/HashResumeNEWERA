    <script>
      (function () {
        if (!localStorage.getItem('sw-cleared')) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              registrations.forEach(function (registration) {
                registration.unregister();
              });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function (cacheNames) {
              cacheNames.forEach(function (cacheName) {
                caches.delete(cacheName);
              });
            });
          }
          localStorage.setItem('sw-cleared', '1');
        }
      })();
    </script>

    <!-- يمنع FOUC — يقرأ اللغة المحفوظة قبل ما React يشتغل -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('language-storage');
          var lang = 'ar';
          if (stored) {
             var parsed = JSON.parse(stored);
             lang = parsed.state.language || 'ar';
          }
          var dir = lang === 'ar' ? 'rtl' : 'ltr';
          document.documentElement.setAttribute('lang', lang);
          document.documentElement.setAttribute('dir', dir);
        } catch (e) {}
      })();

      // معالجة أخطاء تحميل الملفات البرمجية المجزأة (Chunks) لتفادي ظهور صفحة بيضاء عند تحديث الموقع
      window.addEventListener('vite:preloadError', function (event) {
        console.warn('Preload chunk error detected, reloading page...', event);
        window.location.reload();
      });

      window.addEventListener('error', function (e) {
        if (e && e.message && (e.message.indexOf('dynamically imported module') !== -1 || e.message.indexOf('Failed to fetch dynamically imported module') !== -1)) {
          console.warn('Dynamic import chunk error detected, reloading page...', e);
          window.location.reload();
        }
      }, true);
    </script>
