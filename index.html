<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#FF4D2D" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <title>Hash Resume — Professional AI Resume Builder | 5 Minutes, No Sign-up</title>
    <meta name="description" content="Create a professional, ATS-friendly resume in 5 minutes with AI. Supports English, Arabic, and French. Free to start, no registration required." />
    <meta name="keywords" content="resume builder, cv maker, ai resume, ats friendly, hash resume, job hunting" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hashresume.com/" />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Cairo (عربي) + Plus Jakarta Sans (إنجليزي) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hashresume.com/" />
    <meta property="og:title" content="Hash Resume — سيرتك الاحترافية في 5 دقائق" />
    <meta property="og:description" content="أنشئ سيرتك الذاتية بالذكاء الاصطناعي. عربي وإنجليزي وفرنسي. مجاني بالكامل." />
    <meta property="og:image" content="https://hashresume.com/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hashresume.com/" />
    <meta property="twitter:title" content="Hash Resume — سيرتك الاحترافية في 5 دقائق" />
    <meta property="twitter:image" content="https://hashresume.com/og-image.png" />

    <!-- يمنع FOUC — يقرأ اللغة المحفوظة قبل ما React يشتغل -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('language-storage');
          var lang = 'ar';
          if (stored) {
             var parsed = JSON.parse(stored);
             lang = parsed.state.language || 'en';
          }
          var dir = lang === 'ar' ? 'rtl' : 'ltr';
          document.documentElement.setAttribute('lang', lang);
          document.documentElement.setAttribute('dir', dir);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
