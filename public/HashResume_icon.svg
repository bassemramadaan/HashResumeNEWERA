<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Main red-orange square body with folded corner -->
  <polygon points="0,0 100,0 100,75 75,100 0,100" fill="#F03E1B"/>
  <!-- Folded corner triangle (white) -->
  <polygon points="75,100 100,75 100,100" fill="white"/>
  <!-- Fold shadow -->
  <polygon points="75,100 100,75 75,75" fill="#C8331A"/>
  <!-- Hash # symbol in dark navy -->
  <g fill="#0F1F3D">
    <!-- Horizontal bars -->
    <rect x="22" y="38" width="56" height="10" rx="2"/>
    <rect x="22" y="54" width="56" height="10" rx="2"/>
    <!-- Vertical bars -->
    <rect x="34" y="25" width="10" height="50" rx="2"/>
    <rect x="56" y="25" width="10" height="50" rx="2"/>
  </g>
</svg>
